<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kerr Sage</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --green: #00D632;
  --green-dim: #00b82c;
  --navy: #1B2A5C;
  --navy-light: #243570;
  --bg: #f5f6f8;
  --surface: #ffffff;
  --border: #e2e5ec;
  --text: #1a1d2e;
  --muted: #6b7280;
  --sidebar-w: 220px;
  --header-h: 56px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── LOGIN ── */
#login-screen{
  position:fixed;inset:0;background:var(--navy);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;
}
.login-card{
  background:#fff;border-radius:16px;padding:40px 36px;
  width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.25);
}
.login-logo{
  display:flex;align-items:center;gap:10px;margin-bottom:32px;
}
.login-logo .dot{
  width:36px;height:36px;border-radius:10px;
  background:var(--green);display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;color:#fff;
}
.login-logo span{font-size:22px;font-weight:600;color:var(--navy);}
.login-card label{
  display:block;font-size:12px;font-weight:500;
  color:var(--muted);margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase;
}
.login-card input{
  width:100%;padding:11px 14px;border:1.5px solid var(--border);
  border-radius:8px;font-size:14px;font-family:inherit;
  outline:none;transition:border .15s;margin-bottom:16px;
}
.login-card input:focus{border-color:var(--green);}
.login-btn{
  width:100%;padding:12px;background:var(--green);border:none;
  border-radius:8px;font-size:14px;font-weight:600;color:#fff;
  cursor:pointer;transition:background .15s;font-family:inherit;
}
.login-btn:hover{background:var(--green-dim);}
.login-err{
  color:#e53e3e;font-size:13px;margin-top:12px;
  text-align:center;display:none;
}

/* ── APP SHELL ── */
#app{display:none;min-height:100vh;}

/* ── SIDEBAR ── */
.sidebar{
  position:fixed;top:0;left:0;bottom:0;
  width:var(--sidebar-w);background:var(--navy);
  display:flex;flex-direction:column;z-index:100;
  overflow-y:auto;
}
.sidebar-logo{
  padding:18px 16px 14px;display:flex;align-items:center;gap:9px;
  border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;
}
.sidebar-logo .dot{
  width:30px;height:30px;border-radius:8px;background:var(--green);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#fff;flex-shrink:0;
}
.sidebar-logo span{font-size:16px;font-weight:600;color:#fff;}
.sidebar-user{
  padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;
}
.sidebar-user .uname{font-size:12px;font-weight:500;color:#fff;opacity:.9;}
.sidebar-user .urole{font-size:11px;color:var(--green);font-weight:500;margin-top:1px;}
.sidebar-section{
  padding:16px 10px 6px;font-size:10px;font-weight:600;
  color:rgba(255,255,255,0.35);letter-spacing:.08em;text-transform:uppercase;
}
.nav-item{
  display:flex;align-items:center;gap:9px;padding:9px 12px;
  border-radius:8px;margin:1px 6px;cursor:pointer;
  font-size:13px;font-weight:400;color:rgba(255,255,255,0.7);
  transition:all .15s;border:none;background:none;width:calc(100% - 12px);text-align:left;
}
.nav-item:hover{background:rgba(255,255,255,0.08);color:#fff;}
.nav-item.active{background:rgba(0,214,50,0.15);color:var(--green);font-weight:500;}
.nav-item .icon{font-size:15px;flex-shrink:0;width:18px;text-align:center;}
.sidebar-footer{
  margin-top:auto;padding:12px 10px;border-top:1px solid rgba(255,255,255,0.08);flex-shrink:0;
}
.logout-btn{
  display:flex;align-items:center;gap:8px;padding:8px 12px;
  border-radius:8px;cursor:pointer;font-size:12px;
  color:rgba(255,255,255,0.5);transition:all .15s;
  border:none;background:none;width:100%;font-family:inherit;
}
.logout-btn:hover{color:#fff;background:rgba(255,255,255,0.08);}

/* ── MAIN ── */
.main{
  margin-left:var(--sidebar-w);min-height:100vh;
  display:flex;flex-direction:column;
}
.topbar{
  position:sticky;top:0;background:var(--surface);
  border-bottom:1px solid var(--border);padding:0 28px;
  height:var(--header-h);display:flex;align-items:center;
  justify-content:space-between;z-index:50;flex-shrink:0;
}
.topbar-title{font-size:16px;font-weight:600;color:var(--text);}
.topbar-sub{font-size:12px;color:var(--muted);margin-top:1px;}
.content{padding:24px 28px;flex:1;}

/* ── CARDS ── */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:20px 22px;margin-bottom:16px;
}
.card-title{font-size:14px;font-weight:600;margin-bottom:4px;}
.card-sub{font-size:12px;color:var(--muted);margin-bottom:16px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}

/* ── FORM ELEMENTS ── */
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:5px;}
.field input,.field textarea,.field select{
  width:100%;padding:10px 13px;border:1.5px solid var(--border);
  border-radius:8px;font-size:13px;font-family:inherit;outline:none;
  transition:border .15s;background:#fff;resize:vertical;
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--green);}
.field textarea{min-height:90px;}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 16px;border-radius:8px;font-size:13px;font-weight:500;
  cursor:pointer;border:none;font-family:inherit;transition:all .15s;
}
.btn-primary{background:var(--green);color:#fff;}
.btn-primary:hover{background:var(--green-dim);}
.btn-secondary{background:var(--bg);border:1.5px solid var(--border);color:var(--text);}
.btn-secondary:hover{border-color:var(--navy);}
.btn-navy{background:var(--navy);color:#fff;}
.btn-navy:hover{background:var(--navy-light);}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}

/* ── BADGES ── */
.badge{
  display:inline-block;padding:2px 8px;border-radius:20px;
  font-size:11px;font-weight:500;
}
.badge-green{background:#dcfce7;color:#15803d;}
.badge-blue{background:#dbeafe;color:#1d4ed8;}
.badge-amber{background:#fef3c7;color:#92400e;}
.badge-red{background:#fee2e2;color:#991b1b;}
.badge-gray{background:#f3f4f6;color:#374151;}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{
  text-align:left;padding:10px 12px;font-size:11px;font-weight:600;
  color:var(--muted);border-bottom:1px solid var(--border);
  text-transform:uppercase;letter-spacing:.04em;
}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:#fafbfc;}

/* ── STAT CARDS ── */
.stat{padding:18px 20px;background:var(--surface);border:1px solid var(--border);border-radius:12px;}
.stat-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.stat-val{font-size:28px;font-weight:600;color:var(--text);margin:4px 0 2px;line-height:1;}
.stat-change{font-size:12px;color:var(--muted);}
.stat-change.up{color:#15803d;}
.stat-change.down{color:#dc2626;}

/* ── AI OUTPUT ── */
.ai-output{
  background:#f8fffe;border:1.5px solid #bbf7d0;border-radius:10px;
  padding:14px 16px;font-size:13px;line-height:1.65;min-height:80px;
  color:var(--text);white-space:pre-wrap;
}
.ai-thinking{color:var(--muted);font-style:italic;font-size:13px;}

/* ── PIPELINE TABLE ── */
.stage-pill{
  display:inline-block;padding:3px 10px;border-radius:20px;
  font-size:11px;font-weight:500;
}
.stage-prospect{background:#eff6ff;color:#1d4ed8;}
.stage-qualified{background:#fef3c7;color:#92400e;}
.stage-proposal{background:#f3e8ff;color:#6b21a8;}
.stage-negotiation{background:#fff7ed;color:#c2410c;}
.stage-closed-won{background:#dcfce7;color:#15803d;}
.stage-closed-lost{background:#fee2e2;color:#991b1b;}

/* ── TABS ── */
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:0;}
.tab{
  padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;
  border-bottom:2px solid transparent;color:var(--muted);
  transition:all .15s;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;
  font-family:inherit;
}
.tab.active{color:var(--navy);border-bottom-color:var(--green);}
.tab:hover:not(.active){color:var(--text);}

/* ── ANOMALY ── */
.anomaly-row{
  display:flex;align-items:flex-start;gap:12px;padding:12px 0;
  border-bottom:1px solid var(--border);
}
.anomaly-row:last-child{border-bottom:none;}
.anomaly-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;
}
.a-high{background:#dc2626;}
.a-med{background:#f59e0b;}
.a-low{background:#3b82f6;}

/* ── RESPONSIVE HIDE ── */
.panel{display:none;}
.panel.active{display:block;}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .2s;}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .grid-2,.grid-3{grid-template-columns:1fr;}
  .content{padding:16px;}
  .topbar{padding:0 16px;}
}

/* ── GLOBAL SEARCH ── */
.search-wrap{position:relative;flex:1;max-width:320px;}
.search-wrap input{
  width:100%;padding:7px 12px 7px 32px;
  border:1.5px solid var(--border);border-radius:8px;
  font-size:13px;font-family:inherit;outline:none;
  transition:border .15s;background:var(--bg);
}
.search-wrap input:focus{border-color:var(--green);background:#fff;}
.search-wrap .search-icon{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  font-size:13px;color:var(--muted);pointer-events:none;
}
.search-results{
  position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:#fff;border:1px solid var(--border);border-radius:10px;
  box-shadow:0 8px 24px rgba(0,0,0,0.1);z-index:200;
  max-height:300px;overflow-y:auto;display:none;
}
.search-results.open{display:block;}
.search-result-item{
  padding:10px 14px;font-size:13px;cursor:pointer;
  border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center;
}
.search-result-item:last-child{border-bottom:none;}
.search-result-item:hover{background:var(--bg);}
.search-result-type{font-size:10px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.04em;flex-shrink:0;}

/* ── NOTIFICATION BELL ── */
.notif-btn{
  position:relative;padding:7px;border-radius:8px;
  cursor:pointer;border:none;background:none;font-size:16px;
  color:var(--muted);transition:all .15s;
}
.notif-btn:hover{background:var(--bg);color:var(--text);}
.notif-badge{
  position:absolute;top:2px;right:2px;
  width:16px;height:16px;background:#dc2626;
  border-radius:50%;font-size:9px;font-weight:700;color:#fff;
  display:flex;align-items:center;justify-content:center;
}

/* ── DARK MODE ── */
.dark-toggle{
  padding:7px;border-radius:8px;cursor:pointer;
  border:none;background:none;font-size:15px;
  color:var(--muted);transition:all .15s;
}
.dark-toggle:hover{background:var(--bg);color:var(--text);}
body.dark{
  --bg:#0f1117;--surface:#1a1d2e;--border:#2a2d3e;
  --text:#e2e4f0;--muted:#6b7280;--surface2:#242740;
}
body.dark .login-card{background:#1a1d2e;color:#e2e4f0;}
body.dark .login-card input{background:#0f1117;color:#e2e4f0;border-color:#2a2d3e;}
body.dark .field input,body.dark .field textarea,body.dark .field select{background:#0f1117;color:#e2e4f0;}
body.dark .tbl tr:hover td{background:#242740;}
body.dark .search-results{background:#1a1d2e;}
body.dark .search-result-item:hover{background:#242740;}

/* ── KANBAN ── */
.kanban-board{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;}
.kanban-col{
  flex-shrink:0;width:200px;background:var(--bg);
  border-radius:10px;padding:12px;
}
.kanban-col-title{
  font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:var(--muted);margin-bottom:10px;
  display:flex;justify-content:space-between;align-items:center;
}
.kanban-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:10px 12px;margin-bottom:8px;
  cursor:pointer;transition:box-shadow .15s;font-size:13px;
}
.kanban-card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.kanban-val{font-weight:600;color:var(--navy);font-size:12px;margin-top:4px;}
.kanban-owner{font-size:11px;color:var(--muted);margin-top:2px;}

/* ── PIPELINE VIEW TOGGLE ── */
.view-toggle{display:flex;gap:4px;}
.view-btn{
  padding:5px 10px;border-radius:6px;font-size:12px;
  cursor:pointer;border:1px solid var(--border);background:none;
  color:var(--muted);font-family:inherit;transition:all .15s;
}
.view-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}

/* ── COMMISSION BADGE ── */
.comm-badge{
  display:inline-block;padding:2px 7px;border-radius:4px;
  font-size:10px;font-weight:700;letter-spacing:.04em;
}
.comm-yes{background:#dcfce7;color:#15803d;}
.comm-no{background:#fee2e2;color:#991b1b;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
::-webkit-scrollbar-thumb:hover{background:var(--muted);}

/* ── TOOLTIP ── */
[data-tip]{position:relative;}
[data-tip]:hover::after{
  content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;
  transform:translateX(-50%);background:#1a1d2e;color:#fff;
  font-size:11px;padding:4px 8px;border-radius:5px;white-space:nowrap;z-index:300;
  pointer-events:none;
}

/* ── SKELETON LOADER ── */
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skeleton{
  background:linear-gradient(90deg,var(--border) 25%,var(--bg) 50%,var(--border) 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;
}

/* ── API KEY BANNER ── */
.api-banner{
  background:#fffbeb;border:1px solid #fde68a;border-radius:8px;
  padding:10px 14px;font-size:12px;color:#92400e;
  display:flex;align-items:center;gap:8px;margin-bottom:16px;
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     LOGIN SCREEN
═══════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="dot">S</div>
      <span>Kerr Sage</span>
    </div>
    <label for="lu">Username</label>
    <input type="text" id="lu" placeholder="your username" autocomplete="username"/>
    <label for="lp">Password</label>
    <input type="password" id="lp" placeholder="••••••••" autocomplete="current-password"/>
    <button class="login-btn" onclick="doLogin()">Sign in</button>
    <div class="login-err" id="lerr">Incorrect username or password.</div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     APP
═══════════════════════════════════════════ -->
<div id="app">
  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="dot">S</div>
      <span>Kerr Sage</span>
    </div>
    <div class="sidebar-user">
      <div class="uname" id="sb-name">—</div>
      <div class="urole" id="sb-role">—</div>
    </div>
    <div id="nav-links"></div>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="doLogout()">↩ Sign out</button>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title" id="top-title">Dashboard</div>
        <div class="topbar-sub" id="top-sub">Kerr Consulting · RevOps</div>
      </div>
      <div class="search-wrap" style="margin:0 16px">
        <span class="search-icon">🔍</span>
        <input type="text" id="global-search" placeholder="Search deals, contacts, panels..." autocomplete="off"
          oninput="doSearch(this.value)" onfocus="doSearch(this.value)" onblur="setTimeout(()=>closeSearch(),200)"/>
        <div class="search-results" id="search-results"></div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <button class="notif-btn" onclick="showPanel('anomaly','Anomaly Monitor')" data-tip="Alerts">
          🔔<span class="notif-badge" id="notif-count">3</span>
        </button>
        <button class="dark-toggle" onclick="toggleDark()" id="dark-btn" data-tip="Dark mode">🌙</button>
        <div style="font-size:12px;color:var(--muted)" id="top-date"></div>
      </div>
    </div>
    <div id="api-banner-area"></div>
    <div class="content" id="panel-area"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// KERR SAGE — CONFIGURATION
// Keys and webhooks are fetched from Make.com on load.
// You never need to edit this file again.
// To update any key: change it in Make.com Scenario 1 → Webhook response body.
// ═══════════════════════════════════════════

const MAKE_CONFIG_URL = 'https://hook.us2.make.com/oi4zik8eglprvzgvwrwzqp24iaogkroz';

// These are populated automatically when the app loads via fetchConfig()
// Do NOT edit these manually — update them in Make.com instead
const ANTHROPIC_API_KEY = 'via-cloudflare'; // Key stored securely in Cloudflare Worker
const CLOUDFLARE_WORKER_URL = 'https://kerr-sage-proxy.tarun-jakkaraju.workers.dev/';
// Slack webhooks stored securely in Cloudflare Worker — never in this file
// To post to Slack, call CLOUDFLARE_WORKER_URL with { destination: 'slack', channel: 'kerr_ramp' | 'kerr_internal', text: '...' }
const KERR_SLACK_WEBHOOK    = 'via-cloudflare'; // routed through Cloudflare Worker
const KERR_INTERNAL_SLACK   = 'via-cloudflare'; // routed through Cloudflare Worker  
let RAMP_SLACK_WEBHOOK      = 'via-cloudflare'; // Ramp Support Slack — add to Worker when ready
let MAKE_WEBHOOK_URL_CALENDAR = '';
let MAKE_WEBHOOK_URL_CLOSE    = ''; // Scenario 3: deal close → Slack + Sheet
let MAKE_WEBHOOK_URL_DIGEST   = ''; // Scenario 9: Monday digest
let MAKE_WEBHOOK_URL_DECK     = ''; // Scenario 4: Calendly → prep deck
const MAKE_WEBHOOK_URL_LEAD   = 'https://hook.us2.make.com/xvo5lisxcg94jp1s22v5g6ctgdklvf56'; // Scenario 2: Lead → Slack

// Ramp contacts (static — not sensitive)
const RAMP_CONTACTS = {
  eric:  { name: 'Eric Lengerich', email: 'elengerich@ramp.com' },
  jamie: { name: 'Jamie Kraus',    email: 'jamie.kraus@ramp.com' },
  sean:  { name: 'Sean Fonteyne', email: 'Sfonteyne@ramp.com' },
};

// ─── FETCH CONFIG FROM MAKE.COM ─────────────
// Called once on login. Populates all keys from Make.com.
// To update a key: change it in Make.com, no file edit needed.
async function fetchConfig() {
  try {
    const res = await fetch(MAKE_CONFIG_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'get_config' })
    });
    // Read as text first — Make.com sometimes sends wrong Content-Type
    const raw = await res.text();
    console.log('Kerr Sage: Make.com raw response:', raw);
    // Strip anything before the first { and after the last }
    const jsonStr = raw.substring(raw.indexOf('{'), raw.lastIndexOf('}') + 1);
    const cfg = JSON.parse(jsonStr);
    if (cfg.ramp_slack)     RAMP_SLACK_WEBHOOK        = cfg.ramp_slack.trim(); // Ramp Support Slack from Make.com
    // MAKE_WEBHOOK_URL_LEAD is hardcoded above
    if (cfg.make_calendar)  MAKE_WEBHOOK_URL_CALENDAR = cfg.make_calendar.trim();
    console.log('Kerr Sage: config loaded from Make.com ✅');
    updateBanner();
    return true;
  } catch(e) {
    console.warn('Kerr Sage: could not load config from Make.com —', e.message);
    return false;
  }
}

// ═══════════════════════════════════════════
// AUTH

let currentUser = null;

function doLogin() {
  const u = document.getElementById('lu').value.trim().toLowerCase();
  const p = document.getElementById('lp').value.trim();
  const user = USERS[u];
  if (user && user.pass === p) {
    currentUser = { ...user, key: u };
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    // Show loading state while fetching config from Make.com
    const area = document.getElementById('panel-area');
    if (area) area.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted);font-size:14px">⏳ Loading Kerr Sage config...</div>';
    fetchConfig().then(() => initApp());
  } else {
    document.getElementById('lerr').style.display = 'block';
  }
}

document.getElementById('lp').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('lu').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('lp').focus(); });

function doLogout() {
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('lu').value = '';
  document.getElementById('lp').value = '';
  document.getElementById('lerr').style.display = 'none';
}

function updateDate() {
  const el = document.getElementById('top-date');
  if (el) el.textContent = new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
}

function updateBanner() {
  const banner = document.getElementById('api-banner-area');
  if (!banner) return;
  const apiSet     = true; // Key stored in Cloudflare Worker
  const kerrSlackSet = KERR_SLACK_WEBHOOK && KERR_SLACK_WEBHOOK.startsWith('https://'); // Kerr + Ramp Slack
  const makeSet    = MAKE_WEBHOOK_URL_CALENDAR && MAKE_WEBHOOK_URL_CALENDAR.startsWith('https://');
  const bannerParts = [];
  if (!apiSet)      bannerParts.push('🤖 <strong>AI inactive</strong> — API key not loaded');
  if (!kerrSlackSet) bannerParts.push('💬 <strong>Slack inactive</strong> — add Kerr Slack webhook in Make.com');
  if (!makeSet)     bannerParts.push('⚙️ <strong>Make.com</strong> — calendar webhook pending');
  if (bannerParts.length > 0) {
    banner.innerHTML = `<div class="api-banner" style="margin:12px 28px 0">${bannerParts.join(' &nbsp;·&nbsp; ')}</div>`;
  } else {
    banner.innerHTML = '';
  }
}

function initApp() {
  loadState();
  document.getElementById('sb-name').textContent = currentUser.name;
  document.getElementById('sb-role').textContent = currentUser.role;
  updateDate();
  setInterval(updateDate, 60000);

  // Banner runs after config is fetched — called from fetchConfig().then()
  updateBanner();

  const access = currentUser.access;
  const visible = ALL_PANELS.filter(p => p.access.includes(access));

  // Build nav
  const nav = document.getElementById('nav-links');
  nav.innerHTML = '';
  let lastSection = '';
  visible.forEach(p => {
    if (p.section !== lastSection) {
      const sec = document.createElement('div');
      sec.className = 'sidebar-section';
      sec.textContent = p.section;
      nav.appendChild(sec);
      lastSection = p.section;
    }
    const btn = document.createElement('button');
    btn.className = 'nav-item';
    btn.id = 'nav-' + p.id;
    btn.innerHTML = `<span class="icon">${p.icon}</span>${p.label}`;
    btn.onclick = () => showPanel(p.id, p.label);
    nav.appendChild(btn);
  });

  // Keyboard shortcut: / to focus search, Esc to clear
  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
      e.preventDefault();
      document.getElementById('global-search')?.focus();
    }
    if (e.key === 'Escape') {
      document.getElementById('global-search').blur();
      closeSearch();
    }
  });

  // Show first panel
  showPanel(visible[0].id, visible[0].label);
}

function doSearch(q) {
  const res = document.getElementById('search-results');
  if (!q || q.length < 2) { res.classList.remove('open'); return; }
  const ql = q.toLowerCase();
  const matches = SEARCH_INDEX.filter(item =>
    item.label.toLowerCase().includes(ql) ||
    item.keywords.toLowerCase().includes(ql)
  ).slice(0, 8);
  if (!matches.length) { res.classList.remove('open'); return; }
  const typeColors = {'Panel':'#1d4ed8','Contact':'#15803d','Deal':'#6b21a8','KB':'#92400e'};
  res.innerHTML = matches.map(m => `
    <div class="search-result-item" onclick="showPanel('${m.id}','${m.label.split('—')[0].trim()}');document.getElementById('global-search').value='';closeSearch()">
      <span class="search-result-type" style="color:${typeColors[m.type]||'#374151'}">${m.type}</span>
      <span>${m.label}</span>
    </div>`).join('');
  res.classList.add('open');
}

function closeSearch() {
  document.getElementById('search-results')?.classList.remove('open');
}

function showPanel(id, label) {
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nav-' + id);
  if (nb) nb.classList.add('active');
  document.getElementById('top-title').textContent = label;
  document.title = label + ' — Kerr Sage';
  const area = document.getElementById('panel-area');
  area.innerHTML = renderPanel(id);
}

let stageFilter = '';

function buildPipelineTable(data) {
  let filtered = data.filter(d => {
    const q = pipelineSearch.toLowerCase();
    return (!q || d.company.toLowerCase().includes(q) || d.contact.toLowerCase().includes(q) || d.erp.toLowerCase().includes(q))
      && (!stageFilter || d.stage === stageFilter);
  });
  filtered.sort((a,b) => {
    const mul = pipelineSort.dir==='asc'?1:-1;
    if(pipelineSort.col==='value') return mul*(a.value-b.value);
    return mul*(a[pipelineSort.col]||'').localeCompare(b[pipelineSort.col]||'');
  });
  const stageMap = {'prospect':'stage-prospect','qualified':'stage-qualified','proposal':'stage-proposal','negotiation':'stage-negotiation','closed-won':'stage-closed-won','closed-lost':'stage-closed-lost'};
  const stageLabel = {'prospect':'Prospect','qualified':'Qualified','proposal':'Proposal','negotiation':'Negotiation','closed-won':'Closed Won','closed-lost':'Closed Lost'};
  const thStyle = 'cursor:pointer;user-select:none';
  const sortArrow = (col) => pipelineSort.col===col ? (pipelineSort.dir==='asc'?' ↑':' ↓') : '';
  return `<table class="tbl"><thead><tr>
    <th style="${thStyle}" onclick="sortPipeline('company')">Company${sortArrow('company')}</th>
    <th>Contact</th>
    <th>ERP</th>
    <th style="${thStyle}" onclick="sortPipeline('stage')">Stage${sortArrow('stage')}</th>
    <th style="${thStyle}" onclick="sortPipeline('value')">Value${sortArrow('value')}</th>
    <th>Owner</th>
    <th>Commission</th>
    <th style="${thStyle}" onclick="sortPipeline('close')">Close${sortArrow('close')}</th>
    <th>Actions</th>
  </tr></thead><tbody>
  ${filtered.map(d=>`<tr>
    <td><strong>${d.company}</strong></td>
    <td>${d.contact}<br/><span style="font-size:11px;color:var(--muted)">${d.title}</span></td>
    <td><span class="badge badge-blue">${d.erp}</span></td>
    <td><span class="stage-pill ${stageMap[d.stage]}">${stageLabel[d.stage]}</span></td>
    <td><strong>$${d.value.toLocaleString()}</strong></td>
    <td>${d.owner}</td>
    <td><span class="comm-badge ${d.comm?'comm-yes':'comm-no'}">${d.comm?'✓ COMM':'NO COMM'}</span></td>
    <td>${d.close}</td>
    <td style="white-space:nowrap">
      <button class="btn btn-secondary btn-sm" style="font-size:10px;padding:3px 7px" onclick="pipelineNextAction('${d.company.replace(/'/g,'').replace(/"/g,'')}',event)">AI →</button>
      ${d.stage!=='closed-won'&&d.stage!=='closed-lost'?`
      <button class="btn btn-secondary btn-sm" style="font-size:10px;padding:3px 6px;color:#16a34a;border-color:#16a34a;margin-left:3px" onclick="if(confirm('Mark ${d.company.replace(/'/g,'\'').replace(/"/g,'')} as WON?'))closeDeal('${d.company.replace(/'/g,'').replace(/"/g,'')}','won')">✓ Won</button>
      <button class="btn btn-secondary btn-sm" style="font-size:10px;padding:3px 6px;color:#dc2626;border-color:#dc2626;margin-left:3px" onclick="if(confirm('Mark ${d.company.replace(/'/g,'\'').replace(/"/g,'')} as LOST?'))closeDeal('${d.company.replace(/'/g,'').replace(/"/g,'')}','lost')">✗ Lost</button>`:''}
    </td>
  </tr>`).join('')}
  </tbody></table>`;
}

function buildKanban(data) {
  const stages = ['prospect','qualified','proposal','negotiation','closed-won'];
  const labels = {prospect:'Prospect',qualified:'Qualified',proposal:'Proposal',negotiation:'Negotiation','closed-won':'Closed Won'};
  const stageMap = {prospect:'stage-prospect',qualified:'stage-qualified',proposal:'stage-proposal',negotiation:'stage-negotiation','closed-won':'stage-closed-won'};
  return `<div class="kanban-board">${stages.map(s=>{
    const deals = data.filter(d=>d.stage===s);
    const total = deals.reduce((sum,d)=>sum+d.value,0);
    return `<div class="kanban-col">
      <div class="kanban-col-title"><span>${labels[s]}</span><span>${deals.length}</span></div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px">$${Math.round(total/1000)}K total</div>
      ${deals.map(d=>`<div class="kanban-card">
        <div style="font-weight:600;font-size:13px">${d.company}</div>
        <div style="font-size:11px;color:var(--muted)">${d.contact}</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">
          <span class="kanban-val">$${d.value.toLocaleString()}</span>
          <span class="comm-badge ${d.comm?'comm-yes':'comm-no'}" style="font-size:9px">${d.comm?'COMM':'NO COMM'}</span>
        </div>
        <div class="kanban-owner">${d.owner} · ${d.erp}</div>
      </div>`).join('')}
    </div>`;
  }).join('')}</div>`;
}

function sortPipeline(col) {
  if(pipelineSort.col===col) pipelineSort.dir = pipelineSort.dir==='asc'?'desc':'asc';
  else { pipelineSort.col=col; pipelineSort.dir='desc'; }
  renderPipelineTable();
}

  const body = document.getElementById('pipeline-body');

// ─── TOOL EXECUTOR ─────────────────────────────────────────────────────────
function executeSageTool(name, input) {
  try {
    if (name === 'get_deal') {
      const q = (input.company||'').toLowerCase();
      const deals = PIPELINE_DATA.filter(d => d.company.toLowerCase().includes(q));
      if (!deals.length) return `No deal found matching "${input.company}".`;
      return JSON.stringify(deals.map(d => ({
        company: d.company, contact: d.contact, erp: d.erp,
        stage: d.stage, value: d.value, owner: d.owner,
        close: d.close, source: d.source, commission: d.comm ? 'Yes' : 'NO COMM',
        notes: d.notes
      })), null, 2);
    }

    if (name === 'search_pipeline') {
      let results = PIPELINE_DATA.filter(d => d.stage !== 'closed-won' && d.stage !== 'closed-lost');
      if (input.owner) results = results.filter(d => d.owner.toLowerCase() === input.owner.toLowerCase());
      if (input.stage) results = results.filter(d => d.stage === input.stage);
      if (input.erp)   results = results.filter(d => d.erp.toLowerCase().includes(input.erp.toLowerCase()));
      if (input.min_value) results = results.filter(d => d.value >= input.min_value);
      return JSON.stringify(results.map(d => ({
        company: d.company, erp: d.erp, stage: d.stage,
        value: d.value, owner: d.owner, notes: (d.notes||'').substring(0, 120)
      })), null, 2);
    }

    if (name === 'get_client_profile') {
      const q = (input.name||'').toLowerCase();
      const profile = CLIENT_PROFILES.find(c => c.name.toLowerCase().includes(q));
      if (!profile) return `No client profile found for "${input.name}".`;
      return JSON.stringify(profile, null, 2);
    }

    if (name === 'get_delivery_status') {
      const q = (input.client||'').toLowerCase();
      const proj = DELIVERY_PROJECTS.find(p => p.client.toLowerCase().includes(q));
      if (!proj) return `No delivery project found for "${input.client}".`;
      return JSON.stringify(proj, null, 2);
    }

    if (name === 'get_win_wires') {
      let wires = WIN_WIRE_HISTORY;
      if (input.erp) wires = wires.filter(w => w.erp.toLowerCase().includes(input.erp.toLowerCase()));
      return JSON.stringify(wires, null, 2);
    }

    if (name === 'calculate_roi') {
      const txPerMonth = input.transactions_per_month;
      const txPerYear  = txPerMonth * 12;
      const rate       = input.hourly_rate || 27.50;
      const hoursPerTx = 0.05; // ~3 min per transaction manually
      const hoursSaved = Math.round(txPerMonth * hoursPerTx * 0.9);
      const laborSavings = Math.round(hoursSaved * rate * 12);
      const errorRate  = Math.round(txPerMonth * 0.02);
      const errorCost  = Math.round(errorRate * 125 * 12);
      const tier       = txPerYear <= 10000 ? {name:'Tier 1', price:6000}
                       : txPerYear <= 20000 ? {name:'Tier 2', price:8500}
                       : txPerYear <= 30000 ? {name:'Tier 3', price:11000}
                       : {name:'Custom', price:null};
      const totalSavings = laborSavings + errorCost;
      const roi = tier.price ? Math.round((totalSavings / tier.price) * 10) / 10 : null;
      return JSON.stringify({
        erp: input.erp,
        transactions_per_month: txPerMonth,
        transactions_per_year: txPerYear,
        pricing_tier: tier.name,
        annual_price: tier.price ? '$' + tier.price.toLocaleString() : 'Custom quote',
        hours_saved_per_month: hoursSaved,
        annual_labor_savings: '$' + laborSavings.toLocaleString(),
        annual_error_savings: '$' + errorCost.toLocaleString(),
        total_annual_savings: '$' + totalSavings.toLocaleString(),
        roi_multiple: roi ? roi + 'x' : 'Calculate custom',
        payback_months: tier.price ? Math.round(tier.price / (totalSavings/12)) : null
      }, null, 2);
    }

    if (name === 'get_pipeline_summary') {
      const scope = (input.scope||'all').toLowerCase();
      let data = PIPELINE_DATA;
      if (scope !== 'all') data = data.filter(d => d.owner.toLowerCase() === scope);
      const open = data.filter(d => d.stage !== 'closed-won' && d.stage !== 'closed-lost');
      const won  = data.filter(d => d.stage === 'closed-won');
      const byStage = {};
      ['prospect','qualified','proposal','negotiation'].forEach(s => {
        byStage[s] = { count: open.filter(d=>d.stage===s).length, value: open.filter(d=>d.stage===s).reduce((s,d)=>s+d.value,0) };
      });
      const byERP = {};
      open.forEach(d => { byERP[d.erp] = (byERP[d.erp]||0) + 1; });
      return JSON.stringify({
        scope, open_deals: open.length,
        total_pipeline_value: '$' + open.reduce((s,d)=>s+d.value,0).toLocaleString(),
        closed_won: won.length,
        won_value: '$' + won.reduce((s,d)=>s+d.value,0).toLocaleString(),
        by_stage: byStage, by_erp: byERP
      }, null, 2);
    }


    if (name === 'suggest_next_action') {
      const q = (input.company||'').toLowerCase();
      const d = PIPELINE_DATA.find(x => x.company.toLowerCase().includes(q));
      if (!d) return `No deal found for "${input.company}".`;
      const daysSince = d.notes ? (d.notes.match(/\d+\/\d+/g)||[]).slice(-1)[0] : 'unknown';
      return JSON.stringify({
        company: d.company, stage: d.stage, erp: d.erp, value: d.value,
        owner: d.owner, close: d.close, last_note: (d.notes||'').slice(-200),
        recommendation: `Based on stage (${d.stage}), value ($${d.value.toLocaleString()}), and latest notes, determine the highest-impact next action.`
      }, null, 2);
    }

    if (name === 'analyze_deal_risk') {
      const q = (input.company||'').toLowerCase();
      const d = PIPELINE_DATA.find(x => x.company.toLowerCase().includes(q));
      if (!d) return `No deal found for "${input.company}".`;
      const delivery = DELIVERY_PROJECTS.find(p => p.client.toLowerCase().includes(q));
      return JSON.stringify({
        deal: { company: d.company, stage: d.stage, erp: d.erp, value: d.value, source: d.source, close: d.close, notes: d.notes },
        delivery: delivery || null,
        risk_factors: 'Analyze: stage vs close date, note activity, ERP complexity, source channel, commission flag'
      }, null, 2);
    }

    if (name === 'get_team_activity') {
      const rep = (input.rep||'').toLowerCase();
      const wa = WEEKLY_ACTIVITY;
      const repData = rep && rep !== 'all' ? wa.byRep.filter(r => r.rep.toLowerCase().includes(rep)) : wa.byRep;
      return JSON.stringify({
        window: wa.window,
        summary: wa.totals,
        by_rep: repData,
        recent_wins: wa.wonDeals,
        action_items: wa.actionItems,
        dashboard_metrics: wa.dashboardMetrics
      }, null, 2);
    }

    if (name === 'get_sales_projects') {
      let projects = SALES_PROJECTS;
      if (input.owner) projects = projects.filter(p => p.owner.toLowerCase().includes(input.owner.toLowerCase()));
      if (input.status) projects = projects.filter(p => p.status.toLowerCase().includes(input.status.toLowerCase()));
      return JSON.stringify(projects, null, 2);
    }

    if (name === 'find_similar_prospects') {
      let results = PIPELINE_DATA.filter(d => d.stage !== 'closed-won' && d.stage !== 'closed-lost');
      if (input.erp) results = results.filter(d => d.erp.toLowerCase().includes(input.erp.toLowerCase()));
      if (input.deal_size) {
        if (input.deal_size === 'small')  results = results.filter(d => d.value < 7000);
        if (input.deal_size === 'mid')    results = results.filter(d => d.value >= 7000 && d.value <= 10000);
        if (input.deal_size === 'large')  results = results.filter(d => d.value > 10000);
      }
      return JSON.stringify(results.slice(0,5).map(d => ({
        company: d.company, erp: d.erp, stage: d.stage, value: d.value, owner: d.owner
      })), null, 2);
    }

    if (name === 'get_expense_costs') {
      if (currentUser?.key !== 'dan' && currentUser?.key !== 'tarun') {
        return 'Access restricted — financial data is available to Dan and Tarun only.';
      }
      return JSON.stringify(EXPENSE_DATA, null, 2);
    }

    return 'Tool not found: ' + name;
  } catch(e) {
    return 'Tool error: ' + e.message;
  }
}

async function sendSageMessage() {
  const input = document.getElementById('sage-input');
  const msg = input?.value?.trim();
  if (!msg) return;
  input.value = '';
  const container = document.getElementById('sage-messages');
  if (!container) return;

  const userName = currentUser?.name?.split(' ')[0] || 'You';
  container.innerHTML += `
    <div style="display:flex;gap:10px;align-items:flex-start;justify-content:flex-end">
      <div style="background:var(--navy);color:#fff;border-radius:10px;padding:10px 14px;font-size:13px;line-height:1.6;max-width:85%">${msg}</div>
      <div style="width:28px;height:28px;border-radius:8px;background:var(--muted);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0">${userName[0]}</div>
    </div>`;
  container.scrollTop = container.scrollHeight;

  const thinkId = 'sage-think-' + Date.now();
  container.innerHTML += `
    <div id="${thinkId}" style="display:flex;gap:10px;align-items:flex-start">
      <div style="width:28px;height:28px;border-radius:8px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0">S</div>
      <div class="sage-reply" style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:10px 14px;font-size:13px;color:var(--muted);font-style:italic">Sage is researching your pipeline...</div>
    </div>`;
  container.scrollTop = container.scrollHeight;

  sageChatHistory.push({role:'user', content: msg});

  // ── TRUE AUTONOMOUS AGENT LOOP ─────────────────────────────────────────
  // Runs until Claude says stop_reason === 'end_turn', NOT a fixed counter.
  // Safety max of 10 turns prevents runaway on edge cases.
  let messages = [...sageChatHistory];
  let finalReply = '';
  let agentTurn = 0;
  const AGENT_SAFETY_MAX = 10;

  try {
    while (agentTurn < AGENT_SAFETY_MAX) {
      agentTurn++;
      const res = await fetch(CLOUDFLARE_WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-5',
          max_tokens: 2500,
          system: buildSystemPrompt(),
          tools: SAGE_BRAIN_TOOLS,
          messages: messages
        })
      });
      const data = await res.json();

      if (data.error) {
        finalReply = '⚠️ API error: ' + data.error.message;
        break;
      }

      const stopReason = data.stop_reason;
      const blocks = data.content || [];
      const textBlocks = blocks.filter(b => b.type === 'text');
      const toolUses   = blocks.filter(b => b.type === 'tool_use');

      messages.push({ role: 'assistant', content: blocks });

      // Claude is done — collect final answer
      if (stopReason === 'end_turn' || toolUses.length === 0) {
        finalReply = textBlocks.map(b => b.text).join('') || 'No response.';
        break;
      }

      // Show live tool activity
      const toolNames = toolUses.map(t => t.name.replace(/_/g,' ')).join(', ');
      const thinkEl = document.getElementById(thinkId);
      if (thinkEl) thinkEl.querySelector('.sage-reply').textContent = `Checking: ${toolNames}...`;

      // Execute all tools and feed results back
      const toolResults = toolUses.map(tu => ({
        type: 'tool_result',
        tool_use_id: tu.id,
        content: executeSageTool(tu.name, tu.input)
      }));
      messages.push({ role: 'user', content: toolResults });
    }

    // Sync chat history
    sageChatHistory.length = 0;
    messages.forEach(m => sageChatHistory.push(m));

    // Render final reply
    const thinkEl = document.getElementById(thinkId);
    if (thinkEl) {
      const replyDiv = thinkEl.querySelector('.sage-reply');
      replyDiv.innerHTML = formatSageOutput(finalReply);
      replyDiv.style.fontStyle = 'normal';
      replyDiv.style.color = 'var(--text)';
      replyDiv.style.background = '#f0fdf4';
    }

  } catch(e) {
    const thinkEl = document.getElementById(thinkId);
    if (thinkEl) thinkEl.querySelector('.sage-reply').textContent = 'Connection error — ' + e.message;
  }
  container.scrollTop = container.scrollHeight;
}

function quickAsk(q) {
  const input = document.getElementById('sage-input');
  if (input) { input.value = q; sendSageMessage(); }
}

function clearSageChat() {
  sageChatHistory = [];
  const c = document.getElementById('sage-messages');
  if (c) c.innerHTML = `<div style="display:flex;gap:10px;align-items:flex-start"><div style="width:28px;height:28px;border-radius:8px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0">S</div><div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:10px 14px;font-size:13px;line-height:1.6;max-width:85%">Chat cleared. What can I help you with?</div></div>`;
}

// ─── MEETING HELPER FUNCTIONS ─────────────────

function mtToggleRow(key) {
  const cb = document.getElementById('mt-cb-'+key);
  const row = document.getElementById('mt-row-'+key);
  if (!cb || !row) return;
  row.style.background = cb.checked ? '#f0fdf4' : 'var(--surface)';
}

function mtSelectAll() {
  KERR_TEAM.forEach(m => {
    const cb = document.getElementById('mt-cb-'+m.key);
    if (cb) cb.checked = true;
    mtToggleRow(m.key);
  });
  mtUpdatePreview();
}

function mtClearAll() {
  KERR_TEAM.forEach(m => {
    const cb = document.getElementById('mt-cb-'+m.key);
    if (cb) cb.checked = false;
    mtToggleRow(m.key);
  });
  mtUpdatePreview();
}

function mtSuggestAttendees(purpose) {
  const suggested = MEETING_SUGGESTIONS[purpose] || ['tarun'];
  KERR_TEAM.forEach(m => {
    const cb = document.getElementById('mt-cb-'+m.key);
    if (cb) cb.checked = suggested.includes(m.key);
    mtToggleRow(m.key);
  });
  mtUpdatePreview();
}

function mtAutoFillClient(id) {
  if (!id || id === 'custom') {
    document.getElementById('mt-client-contacts').innerHTML =
      '<span style="font-size:11px;color:var(--muted)">Select a client above to quick-add their contacts</span>';
    return;
  }
  const c = CLIENT_PROFILES.find(x => x.id === id);
  if (!c) return;
  const clientInput = document.getElementById('mt-client');
  if (clientInput) clientInput.value = c.name + (c.contacts[0] ? ' — ' + c.contacts[0].name + ' (' + c.contacts[0].role + ')' : '');

  // Auto-fill context from client profile
  const ctx = document.getElementById('mt-ctx');
  if (ctx && !ctx.value) ctx.value = 'Last touch: ' + c.lastTouch + '\nNext steps: ' + c.nextSteps;

  // Show quick-add buttons for each contact
  const cc = document.getElementById('mt-client-contacts');
  if (cc) {
    cc.innerHTML = '<div style="font-size:11px;font-weight:600;color:var(--muted);width:100%;margin-bottom:4px">Quick add:</div>' +
      c.contacts.map(ct =>
        `<button class="btn btn-secondary btn-sm" onclick="mtQuickAddContact('${ct.name.replace(/'/g,"\\'")}','${ct.email||''}')" style="font-size:11px">
          + ${ct.name} <span style="color:var(--muted)">(${ct.role})</span>
        </button>`
      ).join('');
  }
}

function mtQuickAddContact(name, email) {
  if (!mtExtraAttendees.find(a => a.name === name)) {
    mtExtraAttendees.push({name, email: email||'', source:'client'});
    mtRenderExternalList();
    mtUpdatePreview();
  }
}

function mtAddExternal() {
  const name = document.getElementById('mt-ext-name')?.value?.trim();
  const email = document.getElementById('mt-ext-email')?.value?.trim();
  if (!name) { alert('Please enter a name.'); return; }
  if (mtExtraAttendees.find(a => a.name === name)) { alert(name + ' is already on the list.'); return; }
  mtExtraAttendees.push({name, email, source:'manual'});
  document.getElementById('mt-ext-name').value = '';
  document.getElementById('mt-ext-email').value = '';
  mtRenderExternalList();
  mtUpdatePreview();
}

function mtRemoveExternal(index) {
  mtExtraAttendees.splice(index, 1);
  mtRenderExternalList();
  mtUpdatePreview();
}

function mtRenderExternalList() {
  const el = document.getElementById('mt-external-list');
  if (!el) return;

async function fireMakeWebhook() {
  const all = mtGetAllAttendees();
  if (all.length === 0) { alert('Please select at least one attendee first.'); return; }
  if (MAKE_WEBHOOK_URL_CALENDAR === 'YOUR_MAKE_CALENDAR_WEBHOOK_HERE') {
    const status = document.getElementById('mt-webhook-status');
    if (status) {
      status.style.display = 'block';
      status.style.background = '#fef3c7';
      status.style.color = '#92400e';
      status.textContent = '⚠️ Make.com webhook URL not configured yet. Once you have Make.com set up, paste your webhook URL into the MAKE_WEBHOOK_URL constant in the HTML. The payload is ready — see preview above.';
    }
    return;
  }
  const payload = mtBuildPayload();
  const btn = document.getElementById('mt-webhook-btn');
  const status = document.getElementById('mt-webhook-status');
  if (btn) btn.textContent = '⏳ Sending...';
  try {
    const res = await fetch(MAKE_WEBHOOK_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    if (status) {
      status.style.display = 'block';
      status.style.background = res.ok ? '#dcfce7' : '#fee2e2';
      status.style.color = res.ok ? '#15803d' : '#991b1b';
      status.textContent = res.ok
        ? `✓ Sent to Make.com! Checking availability for ${all.length} people. Results will appear in Slack.`
        : `⚠️ Make.com returned an error (${res.status}). Check your webhook URL.`;
    }
  } catch(e) {
    if (status) {
      status.style.display = 'block';
      status.style.background = '#fee2e2';
      status.style.color = '#991b1b';
      status.textContent = '⚠️ Could not reach Make.com. Check the webhook URL and try again.';
    }
  }
  if (btn) btn.textContent = '⚡ Send to Make.com';
}

function copyInviteText() {
  const out = document.getElementById('mt-out');
  if (!out) return;
  const text = out.textContent;
  const inviteStart = text.indexOf('CALENDAR INVITE DRAFT');
  const snippet = inviteStart > -1 ? text.substring(inviteStart + 25).trim() : text;
  navigator.clipboard.writeText(snippet).then(()=>{
    alert('Calendar invite text copied!');
  }).catch(()=>{
    const r = document.createRange();
    r.selectNode(out);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(r);
    document.execCommand('copy');
    window.getSelection().removeAllRanges();
  });
}

// ─── WIN / LOSS INTELLIGENCE ─────────────────────────────────────
function panelWinLoss() {
  const won = WIN_WIRE_HISTORY;
  const lost = LOST_DEALS;
  const total = won.length + lost.length;
  const winRate = Math.round((won.length / total) * 100);

  // ERP breakdown
  const erpWin = {}, erpLoss = {};
  won.forEach(w  => { erpWin[w.erp]  = (erpWin[w.erp] ||0)+1; });
  lost.forEach(l => { erpLoss[l.erp] = (erpLoss[l.erp]||0)+1; });
  const allERPs = [...new Set([...Object.keys(erpWin),...Object.keys(erpLoss)])];

  // Rep breakdown
  const repWin = {}, repLoss = {};
  won.forEach(w  => { repWin[w.owner]  = (repWin[w.owner] ||0)+1; });
  lost.forEach(l => { repLoss[l.owner] = (repLoss[l.owner]||0)+1; });

  // Revenue
  const wonRev  = won.reduce((s,w)=>s+w.value,0);
  const lostRev = lost.reduce((s,l)=>s+l.value,0);

  return `
  <div class="grid-4" style="margin-bottom:16px">
    <div class="stat"><div class="stat-label">All-Time Win Rate</div><div class="stat-val" style="color:var(--green)">${winRate}%</div><div class="stat-change up">${won.length}W / ${lost.length}L</div></div>

async function logAndRespondObjection() {
  const text = document.getElementById('obj-text')?.value?.trim();
  if (!text) return;
  const cat  = document.getElementById('obj-cat')?.value;
  const erp  = document.getElementById('obj-erp')?.value;
  const resp = document.getElementById('obj-response')?.value?.trim();
  const objs = loadObjections();
  objs.unshift({ text, category:cat, erp, response:resp,
    date: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}),
    rep: currentUser?.name?.split(' ')[0]||'Rep' });
  saveObjections(objs);
  await getObjectionResponse();
  document.getElementById('obj-text').value = '';
  document.getElementById('obj-response').value = '';
}

async function getObjectionResponse() {
  const text = document.getElementById('obj-text')?.value?.trim();
  const cat  = document.getElementById('obj-cat')?.value;
  const erp  = document.getElementById('obj-erp')?.value;
  if (!text) { document.getElementById('obj-ai-out').innerHTML = '<span class="ai-thinking">Enter the objection first.</span>'; return; }

  const objs = loadObjections();
  const similar = objs.filter(o=>o.category===cat&&o.response).slice(0,3);
  const historyLine = similar.length > 0 ? `Past responses to similar ${cat} objections:\n${similar.map(o=>`- "${o.text}" → "${o.response}"`).join('\n')}` : '';

  const prompt = `A prospect just said: "${text}"
Category: ${cat} | ERP Context: ${erp||'general'}
Rep: ${currentUser?.name||'the rep'}
${historyLine}

Use get_win_wires to find relevant closed deals for social proof. Use get_deal if an ERP context was provided.

Generate the ideal response:

## Immediate Response (say this now)
(2-3 sentences — acknowledges concern, reframes, doesn't cave)

## Supporting Data
(specific numbers from our KB — hours saved, ROI, similar client that had this objection and still signed)

## Follow-up Question
(one question to keep the conversation moving)

## If They Push Back Again
(one-sentence bridge to proposal or next step)

Be direct. Don't be defensive. Use our actual data.`;

  agentSage(prompt, 'obj-ai-out', 'Finding best response...');
}

async function getResponseForObjection(idx) {
  const objs = loadObjections();
  const o = objs[idx];
  if (!o) return;
  document.getElementById('obj-text').value = o.text;
  document.getElementById('obj-cat').value  = o.category;
  if (o.erp) document.getElementById('obj-erp').value = o.erp;
  await getObjectionResponse();
}

// Closes a deal: updates PIPELINE_DATA, fires Slack, fires Make.com
async function closeDeal(company, closeType) {
  const deal = PIPELINE_DATA.find(d => d.company === company);
  if (!deal) { alert('Deal not found: ' + company); return; }

  const wasStage = deal.stage;
  deal.stage = closeType === 'won' ? 'closed-won' : 'closed-lost';
  deal.close = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  saveState();

  if (closeType === 'won') {
    // Add to win wire history
    WIN_WIRE_HISTORY.unshift({
      client: deal.company, erp: deal.erp, value: deal.value,
      owner: deal.owner, date: deal.close,
      summary: `Ramp to ${deal.erp} Integration. Source: ${deal.source}.`
    });

    // Fire Slack notification
    await notifySlack('deal_won', {
      company: deal.company, erp: deal.erp,
      value: deal.value, owner: deal.owner,
      source: deal.source
    });

    // Fire Make.com Scenario 3 (deal close → Sheet update)
    if (MAKE_WEBHOOK_URL_CLOSE && MAKE_WEBHOOK_URL_CLOSE.startsWith('https://')) {
      try {
        await fetch(MAKE_WEBHOOK_URL_CLOSE, {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ type:'deal_won', company:deal.company,
            erp:deal.erp, value:deal.value, owner:deal.owner,
            date:deal.close, source:deal.source })
        });
      } catch(e) { console.warn('Make.com close webhook failed:', e); }
    }
  }

  // Refresh current panel
  const active = document.querySelector('.nav-item.active');
  if (active) active.click();

  return deal;
}

// Update a deal stage inline
function updateDealStage(company, newStage) {
  const deal = PIPELINE_DATA.find(d => d.company === company);
  if (!deal) return;
  deal.stage = newStage;
  saveState();
  renderPipelineTable();
}

// Notify Slack via Cloudflare Worker
async function notifySlack(eventType, data) {
  let text = '';
  if (eventType === 'deal_won') {

// AGENT SAGE — Universal autonomous agent function
// Truly loops until Claude says stop_reason === 'end_turn'
// Shows live progress (which tools are firing)
// Used by ALL panels — replaces the old single-call callSage
// ═══════════════════════════════════════════════════════════════
function formatSageOutput(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/^####\s(.+)$/gm, '<div style="font-weight:600;margin:6px 0 3px;font-size:12px;color:var(--navy)">$1</div>')
    .replace(/^###\s(.+)$/gm, '<div style="font-weight:700;margin:10px 0 4px;color:var(--navy)">$1</div>')
    .replace(/^##\s(.+)$/gm, '<div style="font-weight:700;margin:12px 0 5px;font-size:14px;color:var(--navy);border-bottom:1px solid var(--border);padding-bottom:4px">$1</div>')
    .replace(/^- (.+)$/gm, '<div style="padding-left:14px;margin:2px 0">• $1</div>')
    .replace(/^(\d+)\. (.+)$/gm, '<div style="padding-left:14px;margin:2px 0"><strong>$1.</strong> $2</div>')
    .replace(/\n\n/g, '<br/><br/>')
    .replace(/\n/g, '<br/>');
}

async function agentSage(prompt, outId, progressLabel) {
  const el = document.getElementById(outId);
  if (!el) return '';
  el.innerHTML = `<span class="ai-thinking">${progressLabel || 'Sage is researching...'}</span>`;

  const messages = [{role:'user', content: prompt}];
  let finalText = '';
  let turn = 0;
  const SAFETY_MAX = 10; // prevent runaway

  try {
    while (turn < SAFETY_MAX) {
      turn++;
      const res = await fetch(CLOUDFLARE_WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-5',
          max_tokens: 2500,
          system: buildSystemPrompt(),
          tools: SAGE_BRAIN_TOOLS,
          messages: messages
        })
      });
      const data = await res.json();

      if (data.error) {
        el.innerHTML = `<span class="ai-thinking">⚠️ ${data.error.message}</span>`;
        return '';
      }

      const stopReason = data.stop_reason;
      const blocks = data.content || [];
      const textBlocks = blocks.filter(b => b.type === 'text');
      const toolUses   = blocks.filter(b => b.type === 'tool_use');

      messages.push({ role: 'assistant', content: blocks });

      // Done — return final answer
      if (stopReason === 'end_turn' || toolUses.length === 0) {
        finalText = textBlocks.map(b => b.text).join('') || 'No response.';
        break;
      }

      // Show which tools are firing
      const toolNames = toolUses.map(t => t.name.replace(/_/g,' ')).join(', ');
      el.innerHTML = `<span class="ai-thinking">Checking: ${toolNames}...</span>`;

      // Execute tools and feed results back
      const toolResults = toolUses.map(tu => ({
        type: 'tool_result',
        tool_use_id: tu.id,
        content: executeSageTool(tu.name, tu.input)
      }));
      messages.push({ role: 'user', content: toolResults });
    }

    el.innerHTML = formatSageOutput(finalText);
    return finalText;
  } catch(e) {
    el.innerHTML = `<span class="ai-thinking">Connection error — ${e.message}</span>`;
    return '';
  }
}

async function pipelineNextAction(company, evt) {
  const btn = evt?.target;
  if (btn) { btn.textContent = '...'; btn.disabled = true; }

  const prompt = `What is the single best next action for the deal with "${company}" — one specific thing the rep should do today or tomorrow.

Use get_deal to pull their current record. Use analyze_deal_risk if the deal looks stalled. Use get_delivery_status if they might already be a client.

Respond in this exact format (nothing else):
**Next Action:** [One specific, actionable sentence — not generic]
**Why:** [One sentence explanation]
**This week:** [If no response after action, what then]`;

  // Show result in a tooltip-style popup near the button
  const container = btn?.closest('tr');
  const existingTip = container?.querySelector('.next-action-tip');
  if (existingTip) existingTip.remove();

  try {
    const result = await agentSage(prompt, '__null__', '');
    if (btn) { btn.textContent = 'AI →'; btn.disabled = false; }

    if (container) {
      const tip = document.createElement('tr');
      tip.className = 'next-action-tip';
      tip.innerHTML = `<td colspan="9" style="background:#f0fdf4;padding:10px 14px;font-size:12px;border-top:none">
        ${formatSageOutput(result)}
        <button onclick="this.closest('.next-action-tip').remove()" style="margin-left:10px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:11px">✕ dismiss</button>
      </td>`;
      container.after(tip);
    }
  } catch(e) {
    if (btn) { btn.textContent = 'AI →'; btn.disabled = false; }
  }
}

// Override agentSage to handle __null__ output id (used for background calls)
const _origAgentSage = agentSage;
async function agentSage(prompt, outId, progressLabel) {
  if (outId === '__null__') {
    // Background call — no UI element, just return the text
    const messages = [{role:'user', content: prompt}];
    let finalText = '';
    let turn = 0;
    try {
      while (turn < 10) {
        turn++;
        const res = await fetch(CLOUDFLARE_WORKER_URL, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model:'claude-sonnet-4-5', max_tokens:1000,
            system: buildSystemPrompt(), tools: SAGE_BRAIN_TOOLS, messages })
        });
        const data = await res.json();
        if (data.error) break;
        const blocks = data.content || [];
        messages.push({ role:'assistant', content: blocks });
        if (data.stop_reason === 'end_turn' || !blocks.some(b=>b.type==='tool_use')) {
          finalText = blocks.filter(b=>b.type==='text').map(b=>b.text).join('');
          break;
        }
        const toolResults = blocks.filter(b=>b.type==='tool_use').map(tu=>({
          type:'tool_result', tool_use_id:tu.id, content:executeSageTool(tu.name,tu.input)
        }));
        messages.push({ role:'user', content: toolResults });
      }
    } catch(e) {}
    return finalText;
  }
  return _origAgentSage(prompt, outId, progressLabel);
}

function calcQuote() {
  const base = parseInt(document.getElementById('pkg-sel')?.value || 0);
  const erp = document.getElementById('erp-sel')?.value || 'Sage ERP';
  const ao2 = document.getElementById('ao2')?.checked ? 2500 : 0;
  const ao3 = document.getElementById('ao3')?.checked ? 1500 : 0;
  const ao1 = document.getElementById('ao1')?.checked;
  const total = base + ao2 + ao3;
  const el = document.getElementById('quote-total');
  const elErp = document.getElementById('quote-erp');
  if (el) {
    if (base === 0) {
      el.textContent = 'Custom';
    } else {
      el.textContent = '$' + (total).toLocaleString() + (ao1 ? ' + custom dev' : '');
    }
  }
  if (elErp) {
    const tierMap = {'6000':'Tier 1','8500':'Tier 2','11000':'Tier 3','0':'Custom'};
    elErp.textContent = erp + ' · ' + (tierMap[String(base)] || 'Custom');
  }
}

function copyOut(id) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    const btns = document.querySelectorAll(`[onclick="copyOut('${id}')"]`);
    btns.forEach(btn => {
      const orig = btn.textContent;
      btn.textContent = '✓ Copied!';
      btn.style.color = 'var(--green)';
      setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 2000);
    });
  }).catch(() => {
    const range = document.createRange();
    range.selectNode(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand('copy');
    window.getSelection().removeAllRanges();
  });
}

  const prompt = `Check if "${co}" already exists in our pipeline or as a client.

Use search_pipeline to look for this company. Use get_client_profile if it might be an existing client.

Respond in JSON only (no other text):
{
  "duplicate": true/false,

  "suggested_value": suggested deal value number based on similar deals or 6000,

  try {
