<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kerr Sage</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --green: #00D632;
  --green-dim: #00b82c;
  --navy: #1B2A5C;
  --navy-light: #243570;
  --bg: #f5f6f8;
  --surface: #ffffff;
  --border: #e2e5ec;
  --text: #1a1d2e;
  --muted: #6b7280;
  --sidebar-w: 220px;
  --header-h: 56px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── LOGIN ── */
#login-screen{
  position:fixed;inset:0;background:var(--navy);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;
}
.login-card{
  background:#fff;border-radius:16px;padding:40px 36px;
  width:360px;box-shadow:0 20px 60px rgba(0,0,0,0.25);
}
.login-logo{
  display:flex;align-items:center;gap:10px;margin-bottom:32px;
}
.login-logo .dot{
  width:36px;height:36px;border-radius:10px;
  background:var(--green);display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;color:#fff;
}
.login-logo span{font-size:22px;font-weight:600;color:var(--navy);}
.login-card label{
  display:block;font-size:12px;font-weight:500;
  color:var(--muted);margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase;
}
.login-card input{
  width:100%;padding:11px 14px;border:1.5px solid var(--border);
  border-radius:8px;font-size:14px;font-family:inherit;
  outline:none;transition:border .15s;margin-bottom:16px;
}
.login-card input:focus{border-color:var(--green);}
.login-btn{
  width:100%;padding:12px;background:var(--green);border:none;
  border-radius:8px;font-size:14px;font-weight:600;color:#fff;
  cursor:pointer;transition:background .15s;font-family:inherit;
}
.login-btn:hover{background:var(--green-dim);}
.login-err{
  color:#e53e3e;font-size:13px;margin-top:12px;
  text-align:center;display:none;
}

/* ── APP SHELL ── */
#app{display:none;min-height:100vh;}

/* ── SIDEBAR ── */
.sidebar{
  position:fixed;top:0;left:0;bottom:0;
  width:var(--sidebar-w);background:var(--navy);
  display:flex;flex-direction:column;z-index:100;
  overflow-y:auto;
}
.sidebar-logo{
  padding:18px 16px 14px;display:flex;align-items:center;gap:9px;
  border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;
}
.sidebar-logo .dot{
  width:30px;height:30px;border-radius:8px;background:var(--green);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#fff;flex-shrink:0;
}
.sidebar-logo span{font-size:16px;font-weight:600;color:#fff;}
.sidebar-user{
  padding:12px 16px;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;
}
.sidebar-user .uname{font-size:12px;font-weight:500;color:#fff;opacity:.9;}
.sidebar-user .urole{font-size:11px;color:var(--green);font-weight:500;margin-top:1px;}
.sidebar-section{
  padding:16px 10px 6px;font-size:10px;font-weight:600;
  color:rgba(255,255,255,0.35);letter-spacing:.08em;text-transform:uppercase;
}
.nav-item{
  display:flex;align-items:center;gap:9px;padding:9px 12px;
  border-radius:8px;margin:1px 6px;cursor:pointer;
  font-size:13px;font-weight:400;color:rgba(255,255,255,0.7);
  transition:all .15s;border:none;background:none;width:calc(100% - 12px);text-align:left;
}
.nav-item:hover{background:rgba(255,255,255,0.08);color:#fff;}
.nav-item.active{background:rgba(0,214,50,0.15);color:var(--green);font-weight:500;}
.nav-item .icon{font-size:15px;flex-shrink:0;width:18px;text-align:center;}
.sidebar-footer{
  margin-top:auto;padding:12px 10px;border-top:1px solid rgba(255,255,255,0.08);flex-shrink:0;
}
.logout-btn{
  display:flex;align-items:center;gap:8px;padding:8px 12px;
  border-radius:8px;cursor:pointer;font-size:12px;
  color:rgba(255,255,255,0.5);transition:all .15s;
  border:none;background:none;width:100%;font-family:inherit;
}
.logout-btn:hover{color:#fff;background:rgba(255,255,255,0.08);}

/* ── MAIN ── */
.main{
  margin-left:var(--sidebar-w);min-height:100vh;
  display:flex;flex-direction:column;
}
.topbar{
  position:sticky;top:0;background:var(--surface);
  border-bottom:1px solid var(--border);padding:0 28px;
  height:var(--header-h);display:flex;align-items:center;
  justify-content:space-between;z-index:50;flex-shrink:0;
}
.topbar-title{font-size:16px;font-weight:600;color:var(--text);}
.topbar-sub{font-size:12px;color:var(--muted);margin-top:1px;}
.content{padding:24px 28px;flex:1;}

/* ── CARDS ── */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:20px 22px;margin-bottom:16px;
}
.card-title{font-size:14px;font-weight:600;margin-bottom:4px;}
.card-sub{font-size:12px;color:var(--muted);margin-bottom:16px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}

/* ── FORM ELEMENTS ── */
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:5px;}
.field input,.field textarea,.field select{
  width:100%;padding:10px 13px;border:1.5px solid var(--border);
  border-radius:8px;font-size:13px;font-family:inherit;outline:none;
  transition:border .15s;background:#fff;resize:vertical;
}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--green);}
.field textarea{min-height:90px;}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 16px;border-radius:8px;font-size:13px;font-weight:500;
  cursor:pointer;border:none;font-family:inherit;transition:all .15s;
}
.btn-primary{background:var(--green);color:#fff;}
.btn-primary:hover{background:var(--green-dim);}
.btn-secondary{background:var(--bg);border:1.5px solid var(--border);color:var(--text);}
.btn-secondary:hover{border-color:var(--navy);}
.btn-navy{background:var(--navy);color:#fff;}
.btn-navy:hover{background:var(--navy-light);}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}

/* ── BADGES ── */
.badge{
  display:inline-block;padding:2px 8px;border-radius:20px;
  font-size:11px;font-weight:500;
}
.badge-green{background:#dcfce7;color:#15803d;}
.badge-blue{background:#dbeafe;color:#1d4ed8;}
.badge-amber{background:#fef3c7;color:#92400e;}
.badge-red{background:#fee2e2;color:#991b1b;}
.badge-gray{background:#f3f4f6;color:#374151;}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{
  text-align:left;padding:10px 12px;font-size:11px;font-weight:600;
  color:var(--muted);border-bottom:1px solid var(--border);
  text-transform:uppercase;letter-spacing:.04em;
}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:#fafbfc;}

/* ── STAT CARDS ── */
.stat{padding:18px 20px;background:var(--surface);border:1px solid var(--border);border-radius:12px;}
.stat-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.stat-val{font-size:28px;font-weight:600;color:var(--text);margin:4px 0 2px;line-height:1;}
.stat-change{font-size:12px;color:var(--muted);}
.stat-change.up{color:#15803d;}
.stat-change.down{color:#dc2626;}

/* ── AI OUTPUT ── */
.ai-output{
  background:#f8fffe;border:1.5px solid #bbf7d0;border-radius:10px;
  padding:14px 16px;font-size:13px;line-height:1.65;min-height:80px;
  color:var(--text);white-space:pre-wrap;
}
.ai-thinking{color:var(--muted);font-style:italic;font-size:13px;}

/* ── PIPELINE TABLE ── */
.stage-pill{
  display:inline-block;padding:3px 10px;border-radius:20px;
  font-size:11px;font-weight:500;
}
.stage-prospect{background:#eff6ff;color:#1d4ed8;}
.stage-qualified{background:#fef3c7;color:#92400e;}
.stage-proposal{background:#f3e8ff;color:#6b21a8;}
.stage-negotiation{background:#fff7ed;color:#c2410c;}
.stage-closed-won{background:#dcfce7;color:#15803d;}
.stage-closed-lost{background:#fee2e2;color:#991b1b;}

/* ── TABS ── */
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:0;}
.tab{
  padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;
  border-bottom:2px solid transparent;color:var(--muted);
  transition:all .15s;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;
  font-family:inherit;
}
.tab.active{color:var(--navy);border-bottom-color:var(--green);}
.tab:hover:not(.active){color:var(--text);}

/* ── ANOMALY ── */
.anomaly-row{
  display:flex;align-items:flex-start;gap:12px;padding:12px 0;
  border-bottom:1px solid var(--border);
}
.anomaly-row:last-child{border-bottom:none;}
.anomaly-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;
}
.a-high{background:#dc2626;}
.a-med{background:#f59e0b;}
.a-low{background:#3b82f6;}

/* ── RESPONSIVE HIDE ── */
.panel{display:none;}
.panel.active{display:block;}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .2s;}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .grid-2,.grid-3{grid-template-columns:1fr;}
  .content{padding:16px;}
  .topbar{padding:0 16px;}
}

/* ── GLOBAL SEARCH ── */
.search-wrap{position:relative;flex:1;max-width:320px;}
.search-wrap input{
  width:100%;padding:7px 12px 7px 32px;
  border:1.5px solid var(--border);border-radius:8px;
  font-size:13px;font-family:inherit;outline:none;
  transition:border .15s;background:var(--bg);
}
.search-wrap input:focus{border-color:var(--green);background:#fff;}
.search-wrap .search-icon{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  font-size:13px;color:var(--muted);pointer-events:none;
}
.search-results{
  position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:#fff;border:1px solid var(--border);border-radius:10px;
  box-shadow:0 8px 24px rgba(0,0,0,0.1);z-index:200;
  max-height:300px;overflow-y:auto;display:none;
}
.search-results.open{display:block;}
.search-result-item{
  padding:10px 14px;font-size:13px;cursor:pointer;
  border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center;
}
.search-result-item:last-child{border-bottom:none;}
.search-result-item:hover{background:var(--bg);}
.search-result-type{font-size:10px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.04em;flex-shrink:0;}

/* ── NOTIFICATION BELL ── */
.notif-btn{
  position:relative;padding:7px;border-radius:8px;
  cursor:pointer;border:none;background:none;font-size:16px;
  color:var(--muted);transition:all .15s;
}
.notif-btn:hover{background:var(--bg);color:var(--text);}
.notif-badge{
  position:absolute;top:2px;right:2px;
  width:16px;height:16px;background:#dc2626;
  border-radius:50%;font-size:9px;font-weight:700;color:#fff;
  display:flex;align-items:center;justify-content:center;
}

/* ── DARK MODE ── */
.dark-toggle{
  padding:7px;border-radius:8px;cursor:pointer;
  border:none;background:none;font-size:15px;
  color:var(--muted);transition:all .15s;
}
.dark-toggle:hover{background:var(--bg);color:var(--text);}
body.dark{
  --bg:#0f1117;--surface:#1a1d2e;--border:#2a2d3e;
  --text:#e2e4f0;--muted:#6b7280;--surface2:#242740;
}
body.dark .login-card{background:#1a1d2e;color:#e2e4f0;}
body.dark .login-card input{background:#0f1117;color:#e2e4f0;border-color:#2a2d3e;}
body.dark .field input,body.dark .field textarea,body.dark .field select{background:#0f1117;color:#e2e4f0;}
body.dark .tbl tr:hover td{background:#242740;}
body.dark .search-results{background:#1a1d2e;}
body.dark .search-result-item:hover{background:#242740;}

/* ── KANBAN ── */
.kanban-board{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;}
.kanban-col{
  flex-shrink:0;width:200px;background:var(--bg);
  border-radius:10px;padding:12px;
}
.kanban-col-title{
  font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:var(--muted);margin-bottom:10px;
  display:flex;justify-content:space-between;align-items:center;
}
.kanban-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:10px 12px;margin-bottom:8px;
  cursor:pointer;transition:box-shadow .15s;font-size:13px;
}
.kanban-card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.kanban-val{font-weight:600;color:var(--navy);font-size:12px;margin-top:4px;}
.kanban-owner{font-size:11px;color:var(--muted);margin-top:2px;}

/* ── PIPELINE VIEW TOGGLE ── */
.view-toggle{display:flex;gap:4px;}
.view-btn{
  padding:5px 10px;border-radius:6px;font-size:12px;
  cursor:pointer;border:1px solid var(--border);background:none;
  color:var(--muted);font-family:inherit;transition:all .15s;
}
.view-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}

/* ── COMMISSION BADGE ── */
.comm-badge{
  display:inline-block;padding:2px 7px;border-radius:4px;
  font-size:10px;font-weight:700;letter-spacing:.04em;
}
.comm-yes{background:#dcfce7;color:#15803d;}
.comm-no{background:#fee2e2;color:#991b1b;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
::-webkit-scrollbar-thumb:hover{background:var(--muted);}

/* ── TOOLTIP ── */
[data-tip]{position:relative;}
[data-tip]:hover::after{
  content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;
  transform:translateX(-50%);background:#1a1d2e;color:#fff;
  font-size:11px;padding:4px 8px;border-radius:5px;white-space:nowrap;z-index:300;
  pointer-events:none;
}

/* ── SKELETON LOADER ── */
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skeleton{
  background:linear-gradient(90deg,var(--border) 25%,var(--bg) 50%,var(--border) 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;
}

/* ── API KEY BANNER ── */
.api-banner{
  background:#fffbeb;border:1px solid #fde68a;border-radius:8px;
  padding:10px 14px;font-size:12px;color:#92400e;
  display:flex;align-items:center;gap:8px;margin-bottom:16px;
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     LOGIN SCREEN
═══════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="dot">S</div>
      <span>Kerr Sage</span>
    </div>
    <label for="lu">Username</label>
    <input type="text" id="lu" placeholder="your username" autocomplete="username"/>
    <label for="lp">Password</label>
    <input type="password" id="lp" placeholder="••••••••" autocomplete="current-password"/>
    <button class="login-btn" onclick="doLogin()">Sign in</button>
    <div class="login-err" id="lerr">Incorrect username or password.</div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     APP
═══════════════════════════════════════════ -->
<div id="app">
  <!-- SIDEBAR -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="dot">S</div>
      <span>Kerr Sage</span>
    </div>
    <div class="sidebar-user">
      <div class="uname" id="sb-name">—</div>
      <div class="urole" id="sb-role">—</div>
    </div>
    <div id="nav-links"></div>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="doLogout()">↩ Sign out</button>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title" id="top-title">Dashboard</div>
        <div class="topbar-sub" id="top-sub">Kerr Consulting · RevOps</div>
      </div>
      <div class="search-wrap" style="margin:0 16px">
        <span class="search-icon">🔍</span>
        <input type="text" id="global-search" placeholder="Search deals, contacts, panels..." autocomplete="off"
          oninput="doSearch(this.value)" onfocus="doSearch(this.value)" onblur="setTimeout(()=>closeSearch(),200)"/>
        <div class="search-results" id="search-results"></div>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <button class="notif-btn" onclick="showPanel('anomaly','Anomaly Monitor')" data-tip="Alerts">
          🔔<span class="notif-badge" id="notif-count">3</span>
        </button>
        <button class="dark-toggle" onclick="toggleDark()" id="dark-btn" data-tip="Dark mode">🌙</button>
        <div style="font-size:12px;color:var(--muted)" id="top-date"></div>
      </div>
    </div>
    <div id="api-banner-area"></div>
    <div class="content" id="panel-area"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════
const USERS = {
  'tarun': { pass: 'kerr-tarun', name: 'Tarun Jakkaraju', role: 'Admin', access: 'admin' },
  'ed':    { pass: 'kerr-ed',    name: 'Ed Hosey',        role: 'Account Executive', access: 'ed' },
  'dan':   { pass: 'kerr-dan',   name: 'Dan',             role: 'Account Executive', access: 'dan' },
};

let currentUser = null;

function doLogin() {
  const u = document.getElementById('lu').value.trim().toLowerCase();
  const p = document.getElementById('lp').value.trim();
  const user = USERS[u];
  if (user && user.pass === p) {
    currentUser = { ...user, key: u };
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  } else {
    document.getElementById('lerr').style.display = 'block';
  }
}

document.getElementById('lp').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('lu').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('lp').focus(); });

function doLogout() {
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('lu').value = '';
  document.getElementById('lp').value = '';
  document.getElementById('lerr').style.display = 'none';
}

// ═══════════════════════════════════════════
// NAV DEFINITIONS
// ═══════════════════════════════════════════
const ALL_PANELS = [
  // SHARED — everyone
  { id:'pipeline',   label:'Pipeline',          icon:'📊', section:'Shared', access:['admin','ed','dan'] },
  { id:'contacts',   label:'Contacts',           icon:'👥', section:'Shared', access:['admin','ed','dan'] },
  { id:'tracker',    label:'Live Tracker',       icon:'📡', section:'Shared', access:['admin','ed','dan'] },
  { id:'pricing',    label:'Pricing',            icon:'💲', section:'Shared', access:['admin','ed','dan'] },
  { id:'anomaly',    label:'Anomaly Monitor',    icon:'🔍', section:'Shared', access:['admin','ed','dan'] },
  { id:'sagebrain',  label:'Sage Brain',         icon:'🤖', section:'Shared', access:['admin','ed','dan'] },
  { id:'writing',    label:'Writing Assistant',  icon:'✍️',  section:'Shared', access:['admin','ed','dan'] },
  { id:'clarifier',  label:'Sage Clarifier',     icon:'🧠', section:'Shared', access:['admin','ed','dan'] },
  { id:'secretary',  label:'AI Secretary',       icon:'📅', section:'Shared', access:['admin','ed','dan'] },
  { id:'houston',    label:'Houston Networking', icon:'🤝', section:'Shared', access:['admin','ed','dan'] },
  { id:'register',   label:'Register Lead',      icon:'➕', section:'Shared', access:['admin','ed','dan'] },
  { id:'scheduler',  label:'Scheduler',          icon:'🗓️', section:'Shared', access:['admin','ed','dan'] },
  { id:'capture',    label:'Quick Capture',      icon:'⚡', section:'Shared', access:['admin','ed','dan'] },
  { id:'customdev',  label:'Custom Dev',         icon:'🔧', section:'Shared', access:['admin','ed','dan'] },
  // TARUN ONLY

  // API banner
  const banner = document.getElementById('api-banner-area');
  if (banner) {
    if (!ANTHROPIC_API_KEY || ANTHROPIC_API_KEY === 'YOUR_API_KEY_HERE') {
      banner.innerHTML = `<div class="api-banner" style="margin:12px 28px 0">⚠️ <strong>AI panels inactive</strong> — Add your Anthropic API key to line 1134 to activate Writing Assistant, Sage Brain, Clarifier, and all AI features.</div>`;
    }
  }

  const access = currentUser.access;
  const visible = ALL_PANELS.filter(p => p.access.includes(access));

  // Build nav
  const nav = document.getElementById('nav-links');
  nav.innerHTML = '';
  let lastSection = '';
  visible.forEach(p => {
    if (p.section !== lastSection) {
      const sec = document.createElement('div');
      sec.className = 'sidebar-section';
      sec.textContent = p.section;
      nav.appendChild(sec);
      lastSection = p.section;
    }
    const btn = document.createElement('button');
    btn.className = 'nav-item';
    btn.id = 'nav-' + p.id;
    btn.innerHTML = `<span class="icon">${p.icon}</span>${p.label}`;
    btn.onclick = () => showPanel(p.id, p.label);
    nav.appendChild(btn);
  });

  // Keyboard shortcut: / to focus search, Esc to clear
  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
      e.preventDefault();
      document.getElementById('global-search')?.focus();
    }
    if (e.key === 'Escape') {
      document.getElementById('global-search').blur();
      closeSearch();
    }
  });

  // Show first panel
  showPanel(visible[0].id, visible[0].label);
}

function doSearch(q) {
  const res = document.getElementById('search-results');
  if (!q || q.length < 2) { res.classList.remove('open'); return; }
  const ql = q.toLowerCase();
  const matches = SEARCH_INDEX.filter(item =>
    item.label.toLowerCase().includes(ql) ||
    item.keywords.toLowerCase().includes(ql)
  ).slice(0, 8);
  if (!matches.length) { res.classList.remove('open'); return; }
  const typeColors = {'Panel':'#1d4ed8','Contact':'#15803d','Deal':'#6b21a8','KB':'#92400e'};
  res.innerHTML = matches.map(m => `
    <div class="search-result-item" onclick="showPanel('${m.id}','${m.label.split('—')[0].trim()}');document.getElementById('global-search').value='';closeSearch()">

      <span>${m.label}</span>
    </div>`).join('');
  res.classList.add('open');
}

let stageFilter = '';
function filterPipelineStage(s) { stageFilter = s; renderPipelineTable(); }
function setPipelineView(v) { pipelineView = v; showPanel('pipeline','Pipeline'); }

function buildPipelineTable(data) {
  let filtered = data.filter(d => {
    const q = pipelineSearch.toLowerCase();
    return (!q || d.company.toLowerCase().includes(q) || d.contact.toLowerCase().includes(q) || d.erp.toLowerCase().includes(q))
      && (!stageFilter || d.stage === stageFilter);
  });
  filtered.sort((a,b) => {
    const mul = pipelineSort.dir==='asc'?1:-1;
    if(pipelineSort.col==='value') return mul*(a.value-b.value);
    return mul*(a[pipelineSort.col]||'').localeCompare(b[pipelineSort.col]||'');
  });
  const stageMap = {'prospect':'stage-prospect','qualified':'stage-qualified','proposal':'stage-proposal','negotiation':'stage-negotiation','closed-won':'stage-closed-won','closed-lost':'stage-closed-lost'};
  const stageLabel = {'prospect':'Prospect','qualified':'Qualified','proposal':'Proposal','negotiation':'Negotiation','closed-won':'Closed Won','closed-lost':'Closed Lost'};
  const thStyle = 'cursor:pointer;user-select:none';
  const sortArrow = (col) => pipelineSort.col===col ? (pipelineSort.dir==='asc'?' ↑':' ↓') : '';
  return `<table class="tbl"><thead><tr>
    <th style="${thStyle}" onclick="sortPipeline('company')">Company${sortArrow('company')}</th>
    <th>Contact</th>
    <th>ERP</th>
    <th style="${thStyle}" onclick="sortPipeline('stage')">Stage${sortArrow('stage')}</th>
    <th style="${thStyle}" onclick="sortPipeline('value')">Value${sortArrow('value')}</th>
    <th>Owner</th>
    <th>Commission</th>
    <th style="${thStyle}" onclick="sortPipeline('close')">Close${sortArrow('close')}</th>
  </tr></thead><tbody>
  ${filtered.map(d=>`<tr>
    <td><strong>${d.company}</strong></td>
    <td>${d.contact}<br/><span style="font-size:11px;color:var(--muted)">${d.title}</span></td>
    <td><span class="badge badge-blue">${d.erp}</span></td>
    <td><span class="stage-pill ${stageMap[d.stage]}">${stageLabel[d.stage]}</span></td>
    <td><strong>$${d.value.toLocaleString()}</strong></td>
    <td>${d.owner}</td>
    <td><span class="comm-badge ${d.comm?'comm-yes':'comm-no'}">${d.comm?'✓ COMM':'NO COMM'}</span></td>
    <td>${d.close}</td>
  </tr>`).join('')}
  </tbody></table>`;
}

function buildKanban(data) {
  const stages = ['prospect','qualified','proposal','negotiation','closed-won'];
  const labels = {prospect:'Prospect',qualified:'Qualified',proposal:'Proposal',negotiation:'Negotiation','closed-won':'Closed Won'};
  const stageMap = {prospect:'stage-prospect',qualified:'stage-qualified',proposal:'stage-proposal',negotiation:'stage-negotiation','closed-won':'stage-closed-won'};
  return `<div class="kanban-board">${stages.map(s=>{
    const deals = data.filter(d=>d.stage===s);
    const total = deals.reduce((sum,d)=>sum+d.value,0);
    return `<div class="kanban-col">
      <div class="kanban-col-title"><span>${labels[s]}</span><span>${deals.length}</span></div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px">$${Math.round(total/1000)}K total</div>
      ${deals.map(d=>`<div class="kanban-card">
        <div style="font-weight:600;font-size:13px">${d.company}</div>
        <div style="font-size:11px;color:var(--muted)">${d.contact}</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">
          <span class="kanban-val">$${d.value.toLocaleString()}</span>
          <span class="comm-badge ${d.comm?'comm-yes':'comm-no'}" style="font-size:9px">${d.comm?'COMM':'NO COMM'}</span>
        </div>
        <div class="kanban-owner">${d.owner} · ${d.erp}</div>
      </div>`).join('')}
    </div>`;
  }).join('')}</div>`;
}

function sortPipeline(col) {
  if(pipelineSort.col===col) pipelineSort.dir = pipelineSort.dir==='asc'?'desc':'asc';
  else { pipelineSort.col=col; pipelineSort.dir='desc'; }
  renderPipelineTable();
}

  const body = document.getElementById('pipeline-body');
  if (body) body.innerHTML = pipelineView==='table' ? buildPipelineTable(PIPELINE_DATA) : buildKanban(PIPELINE_DATA);

async function sendSageMessage() {
  const input = document.getElementById('sage-input');
  const msg = input?.value?.trim();
  if (!msg) return;
  input.value = '';
  const container = document.getElementById('sage-messages');
  if (!container) return;

  // Add user message
  const userName = currentUser?.name?.split(' ')[0] || 'You';
  container.innerHTML += `
    <div style="display:flex;gap:10px;align-items:flex-start;justify-content:flex-end">
      <div style="background:var(--navy);color:#fff;border-radius:10px;padding:10px 14px;font-size:13px;line-height:1.6;max-width:85%">${msg}</div>
      <div style="width:28px;height:28px;border-radius:8px;background:var(--muted);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0">${userName[0]}</div>
    </div>`;
  container.scrollTop = container.scrollHeight;

  // Thinking indicator
  const thinkId = 'sage-think-' + Date.now();
  container.innerHTML += `
    <div id="${thinkId}" style="display:flex;gap:10px;align-items:flex-start">
      <div style="width:28px;height:28px;border-radius:8px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0">S</div>
      <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:10px 14px;font-size:13px;color:var(--muted);font-style:italic">Sage is thinking...</div>
    </div>`;
  container.scrollTop = container.scrollHeight;

  sageChatHistory.push({role:'user', content: msg});

  if (!ANTHROPIC_API_KEY || ANTHROPIC_API_KEY === 'YOUR_API_KEY_HERE') {
    document.getElementById(thinkId).querySelector('div:last-child').textContent = '⚠️ API key not set — add your Anthropic key to activate Sage Brain.';
    return;
  }

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': ANTHROPIC_API_KEY,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1200,
        system: SAGE_SYSTEM_PROMPT,
        messages: sageChatHistory
      })
    });
    const data = await res.json();
    const reply = data.content?.map(b=>b.text||'').join('') || 'No response.';
    sageChatHistory.push({role:'assistant', content: reply});

    const thinkEl = document.getElementById(thinkId);
    if (thinkEl) {
      thinkEl.querySelector('div:last-child').innerHTML = reply.replace(/\n/g,'<br/>');
      thinkEl.querySelector('div:last-child').style.fontStyle = 'normal';
      thinkEl.querySelector('div:last-child').style.color = 'var(--text)';
    }
  } catch(e) {
    const thinkEl = document.getElementById(thinkId);
    if (thinkEl) thinkEl.querySelector('div:last-child').textContent = 'Connection error — check your API key.';
  }
  container.scrollTop = container.scrollHeight;
}

function quickAsk(q) {
  const input = document.getElementById('sage-input');
  if (input) { input.value = q; sendSageMessage(); }
}

}

async function callSage(prompt, outId) {
  const el = document.getElementById(outId);
  if (!el) return;
  el.innerHTML = '<span class="ai-thinking">Sage is thinking...</span>';
  if (!ANTHROPIC_API_KEY || ANTHROPIC_API_KEY === 'YOUR_API_KEY_HERE') {
    el.innerHTML = '<span class="ai-thinking">⚠️ API key not set — paste your Anthropic key into the HTML where it says YOUR_API_KEY_HERE to activate Sage.</span>';
    return;
  }
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': ANTHROPIC_API_KEY,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1200,
        system: SAGE_SYSTEM_PROMPT,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data = await res.json();
    if (data.error) {
      el.innerHTML = `<span class="ai-thinking">Error: ${data.error.message}</span>`;
      return;
    }
    const text = data.content?.map(b=>b.text||'').join('') || 'No response.';
    el.textContent = text;
  } catch(e) {
    el.innerHTML = '<span class="ai-thinking">Connection error — check your API key and try again.</span>';
  }
}

function calcQuote() {
  const base = parseInt(document.getElementById('pkg-sel')?.value || 0);
  const erp = document.getElementById('erp-sel')?.value || 'Sage ERP';
  const ao2 = document.getElementById('ao2')?.checked ? 2500 : 0;
  const ao3 = document.getElementById('ao3')?.checked ? 1500 : 0;
  const ao1 = document.getElementById('ao1')?.checked;
  const total = base + ao2 + ao3;
  const el = document.getElementById('quote-total');
  const elErp = document.getElementById('quote-erp');
  if (el) {
    if (base === 0) {
      el.textContent = 'Custom';
    } else {
      el.textContent = '$' + (total).toLocaleString() + (ao1 ? ' + custom dev' : '');
    }
  }
  if (elErp) {
    const tierMap = {'6000':'Tier 1','8500':'Tier 2','11000':'Tier 3','0':'Custom'};
    elErp.textContent = erp + ' · ' + (tierMap[String(base)] || 'Custom');
  }
}

function copyOut(id) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    const btns = document.querySelectorAll(`[onclick="copyOut('${id}')"]`);
    btns.forEach(btn => {
      const orig = btn.textContent;
      btn.textContent = '✓ Copied!';
      btn.style.color = 'var(--green)';
      setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 2000);
    });
  }).catch(() => {
    const range = document.createRange();
    range.selectNode(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand('copy');
    window.getSelection().removeAllRanges();
  });
}
